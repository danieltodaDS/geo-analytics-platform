version: 2

models:
  - name: int_olist_geolocation
    description: CEP consolidado com centróide lat/lng (avg) e moda de cidade/estado.
    columns:
      - name: geolocation_zip_code_prefix
        data_tests: [not_null, unique]
      - name: geolocation_city_slug
        description: Nome da cidade normalizado (sem acentos, snake_case) — chave de join com int_ibge_municipios.nome_municipio_slug.
        data_tests: [not_null]

  - name: int_olist_order_payments_agg
    description: Pagamentos pivotados por tipo de pagamento, no grão order.
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_payment_value >= 0"
    columns:
      - name: order_id
        data_tests: [not_null, unique]

  - name: int_olist_order_items_agg
    description: Itens de pedido agregados por order_id, com categoria dominante via MODE().
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "items_count > 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_revenue >= 0"
    columns:
      - name: order_id
        data_tests: [not_null, unique]

  - name: int_olist_order_reviews_agg
    description: Review mais recente por pedido. Empate de timestamp é não-determinístico.
    columns:
      - name: order_id
        data_tests: [not_null, unique]
      - name: review_score
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false

  - name: int_dim_customers
    description: >
      Dimensão de clientes reais (customer_unique_id) com CEP modal e lat/lng canônicos. Consumida no mart.
      MODE() em customer_zip_code_prefix — em empate de frequência entre CEPs, resultado é não-determinístico.
    columns:
      - name: customer_unique_id
        data_tests: [not_null, unique]
      - name: customer_city_slug
        description: Nome da cidade normalizado (sem acentos, snake_case) — chave de join com int_ibge_municipios.nome_municipio_slug.
        data_tests: [not_null]

  - name: int_dim_sellers
    description: Dimensão de vendedores enriquecida com lat/lng via CEP. Consumida no mart.
    columns:
      - name: seller_id
        data_tests: [not_null, unique]
      - name: seller_city_slug
        description: Nome da cidade normalizado (sem acentos, snake_case) — chave de join com int_ibge_municipios.nome_municipio_slug.
        data_tests: [not_null]

  - name: int_dim_products
    description: Dimensão de produtos com product_volume_cm3 derivado. Consumida no mart.
    columns:
      - name: product_id
        data_tests: [not_null, unique]

  - name: int_ibge_censo_covariaveis
    description: Covariáveis do Censo 2022 pivotadas — 1 linha por município (5.570 municípios; Fernando de Noronha sem cobertura IBGE).
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "populacao_residente > 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "renda_media_per_capita > 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "renda_mediana_per_capita > 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "pct_domicilios_com_internet > 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "renda_mediana_per_capita <= renda_media_per_capita"
    columns:
      - name: codigo_municipio
        data_tests: [not_null, unique]

  - name: int_ibge_municipios
    description: Dimensão de municípios — hierarquia geográfica (UF, macrorregião) + covariáveis do Censo 2022. Consumida no mart.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [nome_municipio_slug, uf_sigla]
    columns:
      - name: id_municipio
        data_tests: [not_null, unique]
      - name: nome_municipio
        data_tests: [not_null]
      - name: nome_municipio_slug
        description: Nome do município normalizado (sem acentos, snake_case) — chave de join com colunas _slug das tabelas Olist. Único por (slug, uf_sigla).
        data_tests: [not_null]
      - name: uf_sigla
        data_tests: [not_null]
      - name: uf_nome
        data_tests: [not_null]
      - name: macroregiao_sigla
        data_tests: [not_null]
      - name: macroregiao_nome
        data_tests: [not_null]

  - name: int_bcb_pix_municipio
    description: PIX por município/mês — ano_mes convertido para DATE, totais pagador/recebedor derivados.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [municipio_ibge, ano_mes_data]
      - dbt_utils.expression_is_true:
          arguments:
            expression: "vl_total_pagador >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "vl_total_recebedor >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qt_total_transacoes_pagador >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "qt_total_transacoes_recebedor >= 0"
    columns:
      - name: municipio_ibge
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int_ibge_municipios')
                field: id_municipio
      - name: ano_mes_data
        data_tests: [not_null]

  - name: int_fact_orders
    description: Fato central no grão order. Todos os status preservados — filtros são responsabilidade do mart.
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_payment_value IS NULL OR total_payment_value >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "items_count IS NULL OR items_count > 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "approval_days IS NULL OR approval_days >= 0"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "delivery_days IS NULL OR delivery_days >= 0"
    columns:
      - name: order_id
        data_tests: [not_null, unique]
      - name: customer_unique_id
        data_tests: [not_null]
      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_olist_customers')
                field: customer_id
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values: [delivered, shipped, canceled, unavailable, invoiced, processing, created, approved]
      - name: is_on_time
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: review_score
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
                quote: false
