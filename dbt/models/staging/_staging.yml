version: 2

models:
  - name: stg_olist_customers
    description: Clientes Olist. Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [customer_id]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: customer_id
        data_tests: [not_null]

  - name: stg_olist_orders
    description: Pedidos Olist. Datas castadas de VARCHAR para TIMESTAMP. Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [order_id]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: order_id
        data_tests: [not_null]

  - name: stg_olist_order_items
    description: Itens de pedido Olist. Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [order_id, order_item_id]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: order_item_pk
        data_tests: [not_null]

  - name: stg_olist_order_payments
    description: Pagamentos Olist. Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [order_id, payment_sequential]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: payment_pk
        data_tests: [not_null]

  - name: stg_olist_order_reviews
    description: Avaliações Olist. review_id não é único no raw (mesmo review aplicado a múltiplos pedidos). Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [review_id, order_id]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: review_pk
        data_tests: [not_null]
      - name: review_id
        data_tests: [not_null]

  - name: stg_olist_geolocation
    description: Geolocalização por CEP. Múltiplas linhas por zip preservadas (dedup semântica no intermediate). Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: []
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: geolocation_zip_code_prefix
        data_tests: [not_null]

  - name: stg_olist_products
    description: Produtos Olist. Typos corrigidos (lenght→length). Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [product_id]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: product_id
        data_tests: [not_null]

  - name: stg_olist_sellers
    description: Vendedores Olist. Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [seller_id]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: seller_id
        data_tests: [not_null]

  - name: stg_ibge_localidades
    description: Municípios IBGE. microrregiao_id e mesorregiao_id castados de DOUBLE para INTEGER. Dedup técnica via row_hash.
    config:
      meta:
        natural_pk: [id_municipio]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: id_municipio
        data_tests: [not_null]

  - name: stg_ibge_censo_9936
    description: SIDRA 9936 — % domicílios com conexão à internet. Grain (municipio). Filtrado na ingestão para internet=Sim + variável percentual.
    config:
      meta:
        natural_pk: [codigo_municipio]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: codigo_municipio
        data_tests: [not_null]
      - name: pct_domicilios_com_internet
        data_tests: [not_null]

  - name: stg_ibge_censo_10295
    description: >
      SIDRA 10295 — rendimento nominal médio e mediano mensal domiciliar per capita.
      Grain (municipio, variavel). Dimensões sexo/grupo_idade/cor_raca sempre = Total por construção da URL de ingestão.
      Variáveis com significado semântico: codigo_variavel='13431' (rendimento médio, R$) e '13534' (rendimento mediano, R$).
      Variáveis '13604' (contagem de moradores) e '1013604' (% do total) são auxiliares — não usar como covariável.
    config:
      meta:
        natural_pk: [codigo_municipio, codigo_variavel]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: codigo_municipio
        data_tests: [not_null]

  - name: stg_ibge_censo_9514
    description: SIDRA 9514 — colunas renomeadas. Grain (municipio, variavel, sexo, declaracao_idade, idade).
    config:
      meta:
        natural_pk: [codigo_municipio, codigo_variavel, codigo_sexo, codigo_declaracao_idade, codigo_idade]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: codigo_municipio
        data_tests: [not_null]

  - name: stg_bcb_pix
    description: PIX por município — PascalCase renomeado para snake_case. Grain (municipio_ibge, ano_mes). row_hash de todas as colunas.
    config:
      meta:
        natural_pk: [municipio_ibge, ano_mes]
    columns:
      - name: row_hash
        data_tests: [not_null, unique]
      - name: municipio_ibge
        data_tests: [not_null]
      - name: ano_mes
        data_tests: [not_null]
