name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv sync

      - run: uv run pytest

      - name: dbt parse
        run: cd dbt && uv run dbt deps --profiles-dir . && uv run dbt parse --profiles-dir .
